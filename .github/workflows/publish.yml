name: publish

# Triggered by:
#   - pushing a tag like v1.25.1   (manual or via the gizmosql repo's release CI)
#   - workflow_dispatch from the GitHub UI (paste a version, click run)
#
# Uses PyPI Trusted Publishing (OIDC) — no API token in repo secrets.
# Configure once at https://pypi.org/manage/account/publishing/ with:
#   project = gizmosql, repo = gizmodata/gizmosql-py, workflow = publish.yml,
#   environment (optional) = pypi
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match _version.py and tag)'
        required: true
        type: string

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Sanity-check version matches the tag
        # Belt-and-braces: the package version (from _version.py) and the
        # pushed tag must match. Catches the common "tagged but forgot to
        # bump _version.py" mistake before it lands on PyPI.
        run: |
          PKG_VER=$(python -c "from src.gizmosql._version import __version__; print(__version__)")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VER="${GITHUB_REF##*/}"
            TAG_VER="${TAG_VER#v}"
          else
            TAG_VER="${{ inputs.version }}"
            TAG_VER="${TAG_VER#v}"
          fi
          echo "package version: $PKG_VER"
          echo "tag/input ver:   $TAG_VER"
          if [[ "$PKG_VER" != "$TAG_VER" ]]; then
            echo "::error::version mismatch — bump src/gizmosql/_version.py to $TAG_VER"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gizmosql
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
